# ============================================================
# 智慧风控平台 — 统一后端服务配置
# ============================================================

spring:
  application:
    name: znty-sirm
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/znty_sirm?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

server:
  port: 18090

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.znty.sirm.mapper: DEBUG
