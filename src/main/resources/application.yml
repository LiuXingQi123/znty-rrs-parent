# ============================================================
# RRS — 后端服务配置
# ============================================================

spring:
  application:
    name: znty-rrs
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/znty_rrs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # HTTP 文件上传配置
  http:
    multipart:
      # 单个文件最大 50MB
      max-file-size: 50MB
      # 单次请求总大小最大 200MB（含多文件）
      max-request-size: 200MB

  # JSON 日期时间序列化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 18090

# MyBatis ORM 框架配置
mybatis:
  # Mapper XML 文件扫描路径（classpath* 表示扫描所有 jar 包中的 mapper 目录）
  mapper-locations: classpath*:mapper/**/*.xml
  # 开启驼峰命名映射：数据库字段 user_name 自动映射为 Java 属性 userName
  configuration:
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    com.znty.rrs.mapper: DEBUG

# RRS 业务配置：附件管理模块
rrs:
  attachment:
    storage-path: ${RRS_ATTACHMENT_STORAGE_PATH:D:/uploads/znty_rrs}
  script:
    sql-path: ${RRS_SCRIPT_SQL_PATH:sql}
  # 自动调库定时任务（到期出池等规则）：默认关闭，置 true 启用；cron 默认每天凌晨 2 点
  auto-adjust:
    enabled: ${RRS_AUTO_ADJUST_ENABLED:false}
    cron: ${RRS_AUTO_ADJUST_CRON:0 0 2 * * ?}
